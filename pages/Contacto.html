<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,600;0,700;0,800;1,100;1,400;1,600;1,700&display=swap" rel="stylesheet"/>

<body>
    <header>
        <div class="div-logo">
            <a class="logo" href="./index.html">LOGO</a>
        </div>
        <nav class="header-nav">
            <ul>
                <li>
                    <a href="../index.html">Inicio</a>
                </li>
                <li>
                    <a href="./Contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <h1 class="titulo-contacto">Contactanos</h1>

        <form class="form-contacto" action="" method="POST">
            <div class="grupo-input">
                <label for="email"> Your email: </label>
                <input id="email" type="email" name="email" />
            </div>
            <div class="grupo-input">
                <label for="mensaje"> Your message: </label>
                <textarea id="mensaje" name="message"></textarea>
            </div>
            <button class="btn" type="submit">Send</button>
        </form>
    </main>
    <footer>
        <p>Sitio realizado por Belu para Talento Tech</p>
        <nav>
            <ul class="footer-list">
                <li>
                    <img src="../img/whatsapp.png" alt="logo de whatsapp" />
                </li>
                <li>
                    <img src="../img/social.png" alt="logo de whatsapp" />
                </li>
            </ul>
        </nav>
    </footer>
</body>
