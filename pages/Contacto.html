<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="PolacoMan">    
    <link rel="icon" href="../src/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Así Quedó - Contacto</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>
    <main>
        <h1 class="titulo-contacto">Contactanos</h1>

        <p>Llená los campos necesarios para que podamos ayudarte... O decir que lo hicimos.</p>

        <form action="https://formspree.io/f/mvzdkvaa" method="POST">
            <div class="campo">
                <label for="email">Mail:</label>
                <input type="email" name="email" placeholder="Mail..." required>
            </div>
            <div class="campo">
                <label for="name">Nombre (El tuyo, no inventes.):</label>
                <input type="text" name="name" placeholder="Nombre..." required>
            </div>
            <div class="campo">
                <label for="surname">Apellido:</label>
                <input type="text" name="surname" placeholder="Apellido..." required>
            </div>
            <div class="campo">
                <label for="age">Edad:</label>
                <input type="number" name="age" placeholder="Edad..." required>
            </div>
            <div class="campo">
                <label for="direction">Dirección:</label>
                <input type="text" name="direction" placeholder="Dirección..." required>
            </div>
            <div class="campo">
                <label for="phone">Teléfono:</label>
                <input type="tel" name="phone" placeholder="Número de teléfono..." required>
            </div>
            <div class="campo">
                <label for="identification">DNI:</label>
                <input type="number" name="identification" placeholder="Número de documento..." required>
            </div>
            <div class="campo">
                <label for="lifeInsurance">¿Tenés seguro de vida?</label>
                <select name="lifeInsurance" id="lifeInsurance" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="yes">Sí</option>
                    <option value="sometimes">A veces</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="campo">
                <label for="typeOfBlood">Tipo de sangre</label>
                <select name="typeOfBlood" id="typeOfBlood" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="deceased">No tengo sangre</option>
                </select>
            </div>
            <div class="campo">
                <label for="regret">¿Te vas a arrepentir?</label>
                <select name="regret" id="regret" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="yes">Ya me arrepentí</option>
                    <option value="probably">Probablemente</option>
                    <option value="no">No</option>
                </select>
            </div>
            <div class="campo">
                <label>¿Vivís solo?</label>
                <div class="radio-group">
                    <input type="radio" name="alone" id="alone-yes" value="yes" required>
                    <label for="alone-yes">Sí</label>
                    <input type="radio" name="alone" id="alone-no" value="no" required>
                    <label for="alone-no">No</label>
                </div>
            </div>
            <div class="campo">
                <label for="penalCharges">¿Tenés cargos penales en Andorra o Jamaica?</label>
                <select name="penalCharges" id="penalCharges" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="yes">Sí</option>
                    <option value="probably">Probablemente</option>
                    <option value="no">No</option>
                    <option value="Andorra">Sólo en Andorra</option>
                    <option value="Jamaica">Sólo en Jamaica</option>
                </select>
            </div>
            <div class="campo">
                <label for="knowMarkHamill">¿Conocés personalmente a Mark Hamill?</label>
                <select name="knowMarkHamill" id="knowMarkHamill" required>
                    <option value="">Seleccioná una opción</option>
                    <option value="yes">Sí</option>
                    <option value="no">No</option>
                    <option value="moreThanYes">Lo conozco íntimamente 😉</option>
                </select>
            </div>
            <div class="campo">
                <label for="subject">Asunto:</label>
                <input type="text" name="subject" placeholder="No nos interesa" required>
            </div>
            <div class="campo">
                <label for="reason">¿Por qué estás llenando esto?</label>
                <input type="text" name="reason" placeholder="Cuánto tiempo libre tenés!" required>
            </div>
            <div class="campo form-field-full">
                <label for="message">Tu mensaje:</label>
                <textarea id="message" name="message" placeholder="Poné lo que quieras, no lo vamos a leer."></textarea>
            </div>
            <div class="campo form-field-full">
                <button type="submit">Enviar (No garantiza nada)</button>
            </div>
        </form>
    </main>
    <footer>
        <div class="footer-main">
            <div class="footer-left">
                <p>Así Quedó <img src="../src/favicon.png" alt="logo de Así Quedó" style="width: 30px; height: 30px;"/></p>
                <nav>
                    <ul class="listaFoot">
                        <li>
                            <img class="icono" src="../src/whatsapp.png" alt="logo de Whatsapp"/>
                        </li>
                        <li>
                            <img class="icono" src="../src/mail.png" alt="logo de mail"/>
                        </li>
                        <li>
                            <img class="icono" src="../src/instagram.png" alt="logo de Instagram"/>
                        </li>
                        <li>
                            <img class="icono" src="../src/linkedin.png" alt="logo de LinkedIn"/>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="footer-right">
                <p>Éste es el footer. Si, llegaste al final.</p>
            </div>
        </div>
        <p class="footer-copy">Copyright © 2973 Así Quedó. Todos los derechos reservados.</p>
    </footer>
    <script type="module" src="../scripts/contacto.js"></script>
</body>

</html>
